name: refresh

# Keep the owned dataset snapshots current. Runs weekly (and on demand); commits
# only when the upstream membership actually changed.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  sp500:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pandas lxml requests
      - run: python scripts/refresh_sp500.py
      - name: Commit if changed
        run: |
          git config user.name "crowdsource-bot"
          git config user.email "bot@crowdsource.sh"
          git add sp500/constituents.csv
          if git diff --cached --quiet; then
            echo "No constituent changes."
          else
            git commit -m "chore: refresh S&P 500 constituents ($(date -u +%F))"
            git push
          fi
